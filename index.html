<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Effect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <form>
        <div class="container" id="contentToDownload">
            <div class="row">
                <!-- Left Column -->
                <div class="col-xs-12 col-lg-5">
                    <div>
                        <!-- Observation Table -->
                        <div class="tablehead obs spc" id="tablehead">
                            <h4>OBSERVATION TABLE</h4>
                        </div>
                        <div class="table mt-4">
                            <table id="table1" class="w-100">
                                <tr>
                                    <th class="tablehead" colspan="3">Halls Effect</th>
                                </tr>
                                <tr>
                                    <th>Sr No.</th>
                                    <th>Current (ma)</th>
                                    <th>Hall-Voltage (mv)</th>
                                </tr>
                                <!-- Table Rows -->
                                <tr>
                                    <td><input class="table-input" id="led-r" type="text"></td>
                                    <td><input class="table-input" id="w-r" type="text"></td>
                                    <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                  <td><input class="table-input" id="led-r" type="text"></td>
                                  <td><input class="table-input" id="w-r" type="text"></td>
                                  <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                <td><input class="table-input" id="led-r" type="text"></td>
                                <td><input class="table-input" id="w-r" type="text"></td>
                                <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                <td><input class="table-input" id="led-r" type="text"></td>
                                <td><input class="table-input" id="w-r" type="text"></td>
                                <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                <td><input class="table-input" id="led-r" type="text"></td>
                                <td><input class="table-input" id="w-r" type="text"></td>
                                <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                <td><input class="table-input" id="led-r" type="text"></td>
                                <td><input class="table-input" id="w-r" type="text"></td>
                                <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                <td><input class="table-input" id="led-r" type="text"></td>
                                <td><input class="table-input" id="w-r" type="text"></td>
                                <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <tr>
                                <td><input class="table-input" id="led-r" type="text"></td>
                                <td><input class="table-input" id="w-r" type="text"></td>
                                <td><input class="table-input" id="V-r" type="text"></td>
                                </tr>
                                <!-- Repeat for 8 more rows -->
                            </table>
                        </div>
                        <!-- Calculation Section -->
                        <div class="mt-3">
                            <div class="tablehead obs spc text-center">
                                <h4>CALCULATION</h4>
                            </div>
                        </div>

                        <!-- Procedure Selection -->
                        <div class="d-flex align-items-center mt-3">
                            <p class="h5 mt-1 mr-4">Select the procedure: </p>
                            <div class="dropdown">
                                <button class="btn btn-outline-primary dropdown-toggle" type="button" id="dropdownMenuButton"
                                    data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    Magnetic field Vs Current
                                </button>
                                <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                                    <li><a class="dropdown-item gauss" href="#" data-value="mfc">Magnetic Field vs Current</a></li>
                                    <li><a class="dropdown-item hall" href="#" data-value="he">Hall Effect</a></li>
                                </ul>
                            </div>
                        </div>

                        <!-- Current Selection -->
                        <div class="d-flex align-items-center mt-3">
                            <p class="h5 mt-1 mr-4">Select the Current:</p>
                            <input type="range" id="range" class="form-range my-3 w-50 curr"
                                min="1.0" max="5.0" step="0.5" value="1.0">
                        </div>

                        <!-- Hall Current Selection -->
                        <div class="d-flex align-items-center mt-2 mb-3">
                            <p class="h5 mt-1 mr-4 hallEffect">Select the Hall current:</p>
                            <input type="range" id="range2" class="form-range my-3 w-50 hallEffect"
                                min="1.0" max="5.0" step="0.5" value="1.0">
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex align-items-center">
                            <button type="button" id="fillTableValue" class="btn btn-outline-primary mr-4" disabled>
                                Fill Table
                            </button>
                            <button type="button" id="showGraph" class="btn btn-outline-primary mr-4" disabled>
                                Show Graph
                            </button>
                            <button type="button" id="downloadPdf" class="btn btn-primary" onclick="downloadPDF()" disabled>
                                Download
                            </button>
                        </div>

                        <!-- Hall Effect Calculation -->
                        <div class="d-block align-items-center mt-4">
                            <button id="calculateHall" type="button" class="btn btn-outline-primary" 
                                onclick="toggleHallEffectTable()">
                                Calculate Hall Coefficient and Carrier Concentration
                            </button>
                            <div id="results" class="hidden"></div>
                        </div>

                        <!-- Graph Modal -->
                        <div class="container">
                            <div class="modal" id="graphModal">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5>Graph</h5>
                                        <button id="closeModal" type="button">&times;</button>
                                    </div>
                                    <div class="modal-body">
                                        <canvas id="popupGraph" width="400" height="300" style="width:100px;height:100px">
                                        </canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column - SVG Container -->
                <div class="col-xs-12 col-lg-7 bt">
                    <div class="center-height">
                        <div class="simulation-container" id="svg-container" 
                            style="width: 100%; height: 100%; min-height: 400px;">
                            <object data="./assets/mfc.svg" type="image/svg+xml"></object>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <!-- Scripts -->
    <!-- Custom Scripts -->
    <script src="tableGraph.js"></script>
    <script src="index.js"></script>
    <script src="index2.js"></script>

    <!-- Third-party Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
</body>
</html>
